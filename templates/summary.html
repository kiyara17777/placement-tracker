{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Practice Summary by Topic</h1>
<table class="table table-hover" style="max-width: 600px;">
    <thead>
        <tr><th>Topic</th><th>Total Practiced</th><th>Solved</th></tr>
    </thead>
    <tbody>
        {% for row in summary_data %}
        <tr>
            <td>{{ row.topic }}</td>
            <td>{{ row.total }}</td>
            <td>{{ row.solved }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
