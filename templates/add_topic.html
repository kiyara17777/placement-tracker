{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Add a Topic</h1>
<form method="POST" class="card p-4 mb-4" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Topic Name</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. DP, Graphs, SQL" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Topic</button>
</form>

<h2>Existing Topics</h2>
<ul class="list-group" style="max-width: 500px;">
    {% for topic in topics %}
        <li class="list-group-item">{{ topic.name }}</li>
    {% endfor %}
</ul>
{% endblock %}
