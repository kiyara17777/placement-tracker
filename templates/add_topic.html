{% extends "base.html" %}
{% block content %}
<div class="page-head">
    <div><div class="eyebrow">Manage</div><h1 class="page-title">Add a Topic</h1></div>
</div>

<div class="card form-panel">
    <form method="POST">
        <div class="field"><label>Topic Name</label><input type="text" name="name" placeholder="e.g. DP, Graphs, SQL" required></div>
        <button type="submit" class="btn btn-primary btn-full">Add Topic</button>
    </form>
</div>

<div style="margin-top:30px;">
    <h3 class="section-title">Existing Topics</h3>
    <div class="topic-grid">
        {% for topic in topics %}
        <div class="topic-chip">{{ topic.name }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
