{% extends "base.html" %}
{% block content %}
<div class="page-head">
    <div><div class="eyebrow">{{ company.name }}</div><h1 class="page-title">Set Topic Weights</h1></div>
</div>

<div class="card form-panel">
    <h3 class="section-title">Weight per Topic (%)</h3>
    <form method="POST">
        {% for topic in topics %}
        <div class="field">
            <label>{{ topic.name }}</label>
            <input type="number" name="weight_{{ topic.id }}" min="0" max="100" step="1"
                   value="{{ (existing_weights.get(topic.id, 0) * 100) | round(0) }}">
        </div>
        {% endfor %}
        <p class="field-note">Weights don't need to sum to exactly 100 — leave a topic at 0 if not relevant.</p>
        <button type="submit" class="btn btn-primary">Save Weights</button>
    </form>
</div>
{% endblock %}
