{% extends "base.html" %}
{% block content %}

<div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Dashboard</h1>
</div>

<div class="row">
    {% if companies %}
        {% for company in companies %}
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                        {{ company.sector or "General" }}
                    </div>
                    <div class="h5 mb-0 font-weight-bold text-gray-800">{{ company.name }}</div>
                    <a href="{{ url_for('readiness', company_id=company.id) }}" class="btn btn-sm btn-outline-primary mt-2">
                        View Readiness
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="col-12">
            <p class="text-muted">No companies added yet. <a href="{{ url_for('add_company') }}">Add one to get started.</a></p>
        </div>
    {% endif %}
</div>

{% endblock %}
