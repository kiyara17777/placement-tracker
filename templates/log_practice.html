{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Log a Practice Question</h1>
<form method="POST" class="card p-4 mb-4" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Topic</label>
        <select name="topic_id" class="form-select" required>
            {% for topic in topics %}
                <option value="{{ topic.id }}">{{ topic.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Question Name</label>
        <input type="text" name="question_name" class="form-control" placeholder="e.g. Longest Increasing Subsequence" required>
    </div>
    <div class="form-check mb-3">
        <input type="checkbox" name="solved" class="form-check-input" id="solvedCheck">
        <label class="form-check-label" for="solvedCheck">Solved?</label>
    </div>
    <button type="submit" class="btn btn-primary">Log Practice</button>
</form>

<h2>Recent Practice Log</h2>
<table class="table table-striped" style="max-width: 700px;">
    <thead>
        <tr><th>Date</th><th>Topic</th><th>Question</th><th>Solved</th></tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.date_practiced }}</td>
            <td>{{ log.topic.name }}</td>
            <td>{{ log.question_name }}</td>
            <td>{% if log.solved %}<span class="badge bg-success">Yes</span>{% else %}<span class="badge bg-secondary">No</span>{% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
