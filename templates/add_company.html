{% extends "base.html" %}
{% block content %}
<div class="page-head">
    <div><div class="eyebrow">Manage</div><h1 class="page-title">Add a Company</h1></div>
</div>

<div class="card form-panel">
    <form method="POST">
        <div class="field"><label>Company Name</label><input type="text" name="name" required></div>
        <div class="field"><label>Sector</label><input type="text" name="sector" placeholder="e.g. Fintech, Product"></div>
        <button type="submit" class="btn btn-primary btn-full">Add Company</button>
    </form>
</div>

<div style="margin-top:30px;">
    <h3 class="section-title">Existing Companies</h3>
    {% for company in companies %}
    <div class="list-row">
        <span>{{ company.name }}</span>
        {% if company.sector %}
            <span class="chip">{{ company.sector | upper }}</span>
        {% else %}
            <span class="chip" style="background:var(--panel-alt); color:var(--muted);">NO SECTOR SET</span>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% endblock %}
