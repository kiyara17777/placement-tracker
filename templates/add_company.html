{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Add a Company</h1>
<form method="POST" class="card p-4 mb-4" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Sector</label>
        <input type="text" name="sector" class="form-control" placeholder="e.g. Fintech, Product">
    </div>
    <button type="submit" class="btn btn-primary">Add Company</button>
</form>

<h2>Existing Companies</h2>
<ul class="list-group" style="max-width: 500px;">
    {% for company in companies %}
        <li class="list-group-item d-flex justify-content-between">
            <span>{{ company.name }}</span>
            <span class="badge bg-secondary">{{ company.sector }}</span>
        </li>
    {% endfor %}
</ul>
{% endblock %}
